# configs/config.yaml — Development environment configuration.
# Override any value via APP_<KEY> env vars, e.g. APP_SERVER_PORT=9090.

server:
  port: 8080
  mode: debug        # debug | release | test
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s
  shutdown_timeout: 30s   # [Step 18] LIFO shutdown total budget (HTTP 5s + Consumer/Bus 15s + Infra 5s + 5s slack)

database:
  # Dev: root connects to the cooking_platform database exposed on localhost:3306.
  # The password matches MYSQL_ROOT_PASSWORD in docker-compose.yml.
  dsn: "root:cooking123@tcp(127.0.0.1:3306)/cooking_platform?charset=utf8mb4&parseTime=True&loc=Local&timeout=5s"
  # [Step 14] Slave replica for read-write splitting via GORM DBResolver.
  # Port 3307 is the host-mapped port for cooking-mysql-slave-dev.
  # Empty list → DBResolver not registered, all traffic goes to master.
  slaves_dsn:
    - "root:cooking123@tcp(127.0.0.1:3307)/cooking_platform?charset=utf8mb4&parseTime=True&loc=Local&timeout=5s"
  max_open_conns: 25
  max_idle_conns: 10
  max_lifetime: 5m
  max_idle_time: 5m
  log_level: info    # silent | error | warn | info

redis:
  # Dev: no password, default port exposed by docker-compose.
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  pool_size: 10
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

log:
  level: debug        # debug | info | warn | error
  console: true       # true = coloured console output (dev); false = JSON file (prod)
  filename: logs/app.log
  max_size: 100       # MB
  max_backups: 7
  max_age: 30         # days
  compress: true

jwt:
  secret: "dev-jwt-secret-change-in-production-min-32-chars"
  access_token_ttl: 2h
  refresh_token_ttl: 168h   # 7 days

mq:
  provider: channel   # channel (MVP) | rabbitmq (production)
  url: ""             # amqp://user:pass@host:5672/ — only used when provider=rabbitmq
  timeout: 5s
  reconnect_max_retries: 5     # max reconnect attempts; 0 = no retry
  reconnect_initial_delay: 1s  # exponential backoff base (1s→2s→4s…capped at 30s)

# [Step 3] SMS provider configuration.
# Dev uses 'mock' — verification codes are logged instead of sent.
# Inspect logs to find the code: search for "[SMS MOCK]" in stdout.
# Prod 走阿里云 dypns 号码认证服务（自带 code 模式），见 docs/maintenance/2026-06-02_sms_dypns_migration.md。
sms:
  provider: mock          # mock | aliyun
  access_key_id: ""       # env: APP_SMS_ACCESS_KEY_ID  (aliyun only)
  access_key_secret: ""   # env: APP_SMS_ACCESS_KEY_SECRET (aliyun only)
  sign_name: ""           # dypns 赠送签名名称（如 "速通互联验证码"），provider=aliyun 时必填
  template_code: ""       # dypns 赠送模板 Code（如 "100001"），provider=aliyun 时必填
  code_length: 6
  code_ttl: 5m            # 同时驱动模板 ${min} 变量 = ceil(code_ttl / 60s)

# [Step 10] Content moderation configuration.
# Dev uses 'mock' — AuditConsumer auto-approves posts immediately (mock_result=pass).
# Set mock_result=reject to test rejection flow without real API calls.
audit:
  provider: mock          # mock | aliyun
  access_key_id: ""       # env: APP_AUDIT_ACCESS_KEY_ID  (aliyun only)
  access_key_secret: ""   # env: APP_AUDIT_ACCESS_KEY_SECRET (aliyun only)
  region: cn-shanghai     # Aliyun Green service region (aliyun only)
  mock_result: pass       # dev only: pass | suspect | reject
  timeout: 3s             # [Step 18] per-call timeout to upstream SDK
  max_retries: 2          # [Step 18] retry budget for transient upstream errors

# [Step 9] OSS provider configuration.
# Dev uses 'mock' — pkg/oss/mock.go starts an embedded HTTP listener on
# mock_listen_addr that accepts PUT /<object_key>, so verify_step9.sh can run
# the full presign → real PUT → callback chain locally without Aliyun.
# url_prefix MUST point at the mock listener for the whitelist check to pass.
oss:
  provider: mock                              # mock | aliyun
  access_key_id: ""                           # ignored by mock
  access_key_secret: ""                       # ignored by mock
  endpoint: ""                                # ignored by mock
  bucket: cooking-dev
  url_prefix: "http://127.0.0.1:18080/"       # MUST equal mock_listen_addr URL
  presign_ttl: 15m
  max_image_size: 5242880                     # 5 MiB
  upload_hourly: 30                           # per-user presign rate cap
  mock_listen_addr: "127.0.0.1:18080"

# [Step 11+18] Phone field-level encryption.
# Step 18 changed crypto/phone.go to fail-closed: empty phone_key now returns
# ErrPhoneKeyMissing (480103) instead of silently storing plaintext. Dev gets
# a committed test key below so login still works out of box; prod MUST inject
# its own via env vars (config.Validate refuses release mode with empty key).
# Generate a real key: openssl rand -hex 32  → phone_key (64 hex chars)
#                      openssl rand -base64 32 → phone_pepper (arbitrary string)
encryption:
  # DEV ONLY — DO NOT USE IN PROD. Identical to test fixture so unit and
  # integration test paths share a key without env-var plumbing.
  phone_key: "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"
  phone_pepper: "dev-pepper-change-in-prod"

# [Step 3] Rate-limit configuration.
# Three-dimension SMS protection (enforced in internal/service/user_service.go):
#   - sms_phone_window: minimum interval between two send-code requests for the same phone
#   - sms_per_phone_per_day: max sends to the same phone in 24h
#   - sms_per_ip_per_day: max sends from the same IP in 24h (IP is SHA-256 hashed before use)
ratelimit:
  sms_phone_window: 60s
  sms_per_phone_per_day: 5
  sms_per_ip_per_day: 10

# [Step 13] Consumer batch/flush tuning.
# Exposed here so RabbitMQ production tuning requires only a config change + restart.
consumer:
  like:
    batch_size: 50
    flush_interval: 3s
  pv:
    batch_size: 100
    flush_interval: 5s
  count:
    batch_size: 20
    flush_interval: 10s

# [Step 13] Cache TTLs.
# Exposed here so TTL adjustments (e.g. shorter PV dedup for high-traffic events)
# require only a config change + restart.
cache:
  like_state_ttl: 168h        # 7 days — see like_cache.go for rationale
  feed_cache_ttl: 5m          # per feed page; shorter = fresher but more DB load
  pv_dedup_ttl: 1h            # PRD-Phase2 §6 F-I02 AC-2
  dedup_ttl: 24h              # Step 18 event-id SETNX dedup window (at-least-once → exactly-once)
  user_sms_daily_ttl: 24h     # Step 18 USER-03 const → cfg (sms:limit:*, sms:ip:*)

# [Step 16] Prometheus metrics exposition.
# namespace prefixes all metric names: "cooking" → cooking_http_requests_total.
# Disable in prod if Prometheus scraping is handled by a side-car instead.
metrics:
  enabled: true
  namespace: cooking

# [Step 18] Search keyword tunables — previously consts in search_service.go.
search:
  max_keyword_len: 50
  boolean_operators: '+-><()~*"@'

# [Step 18] Follow module limits — previously consts in follow_service.go.
follow:
  max_following: 3000
  default_list_size: 20
  max_list_size: 50

# [Step 18] CORS allow lists — previously hardcoded "*" in middleware/cors.go.
# Dev is permissive; prod yaml MUST replace "*" with explicit origin list.
cors:
  allowed_origins: ["*"]
  allowed_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
  allowed_headers: ["Origin", "Content-Type", "Authorization", "X-Request-ID"]
  expose_headers: ["X-Request-ID"]