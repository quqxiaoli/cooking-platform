# configs/config.yaml — Development environment configuration.
# Override any value via APP_<KEY> env vars, e.g. APP_SERVER_PORT=9090.

server:
  port: 8080
  mode: debug        # debug | release | test
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s

database:
  # Dev: root connects to the cooking_platform database exposed on localhost:3306.
  # The password matches MYSQL_ROOT_PASSWORD in docker-compose.yml.
  dsn: "root:cooking123@tcp(127.0.0.1:3306)/cooking_platform?charset=utf8mb4&parseTime=True&loc=Local&timeout=5s"
  max_open_conns: 25
  max_idle_conns: 10
  max_lifetime: 5m
  max_idle_time: 5m
  log_level: info    # silent | error | warn | info

redis:
  # Dev: no password, default port exposed by docker-compose.
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  pool_size: 10
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

log:
  level: debug        # debug | info | warn | error
  console: true       # true = coloured console output (dev); false = JSON file (prod)
  filename: logs/app.log
  max_size: 100       # MB
  max_backups: 7
  max_age: 30         # days
  compress: true

jwt:
  secret: "dev-jwt-secret-change-in-production-min-32-chars"
  access_token_ttl: 2h
  refresh_token_ttl: 168h   # 7 days

mq:
  provider: channel   # channel (MVP) | rabbitmq (production)
  url: ""             # amqp://user:pass@host:5672/ — only used when provider=rabbitmq
  timeout: 5s

# [Step 3] SMS provider configuration.
# Dev uses 'mock' — verification codes are logged instead of sent.
# Inspect logs to find the code: search for "[SMS MOCK]" in stdout.
sms:
  provider: mock          # mock | aliyun
  access_key_id: ""       # env: APP_SMS_ACCESS_KEY_ID  (aliyun only)
  access_key_secret: ""   # env: APP_SMS_ACCESS_KEY_SECRET (aliyun only)
  sign_name: ""           # Aliyun signature, only used when provider=aliyun
  template_code: ""       # Aliyun template ID, only used when provider=aliyun
  code_length: 6
  code_ttl: 5m

# [Step 10] Content moderation configuration.
# Dev uses 'mock' — AuditConsumer auto-approves posts immediately (mock_result=pass).
# Set mock_result=reject to test rejection flow without real API calls.
audit:
  provider: mock          # mock | aliyun
  access_key_id: ""       # env: APP_AUDIT_ACCESS_KEY_ID  (aliyun only)
  access_key_secret: ""   # env: APP_AUDIT_ACCESS_KEY_SECRET (aliyun only)
  region: cn-shanghai     # Aliyun Green service region (aliyun only)
  mock_result: pass       # dev only: pass | suspect | reject

# [Step 9] OSS provider configuration.
# Dev uses 'mock' — pkg/oss/mock.go starts an embedded HTTP listener on
# mock_listen_addr that accepts PUT /<object_key>, so verify_step9.sh can run
# the full presign → real PUT → callback chain locally without Aliyun.
# url_prefix MUST point at the mock listener for the whitelist check to pass.
oss:
  provider: mock                              # mock | aliyun
  access_key_id: ""                           # ignored by mock
  access_key_secret: ""                       # ignored by mock
  endpoint: ""                                # ignored by mock
  bucket: cooking-dev
  url_prefix: "http://127.0.0.1:18080/"       # MUST equal mock_listen_addr URL
  presign_ttl: 15m
  max_image_size: 5242880                     # 5 MiB
  upload_hourly: 30                           # per-user presign rate cap
  mock_listen_addr: "127.0.0.1:18080"

# [Step 11] Phone field-level encryption.
# Dev: both fields empty → phone_encrypted stores plaintext, phone_hash = SHA256(phone).
# Prod: inject real values via APP_ENCRYPTION_PHONE_KEY / APP_ENCRYPTION_PHONE_PEPPER.
# To generate a dev test key: openssl rand -hex 32
encryption:
  phone_key: ""       # 64-char hex = 32-byte AES-256-GCM key; env: APP_ENCRYPTION_PHONE_KEY
  phone_pepper: ""    # arbitrary secret appended before SHA-256; env: APP_ENCRYPTION_PHONE_PEPPER

# [Step 3] Rate-limit configuration.
# Three-dimension SMS protection (enforced in internal/service/user_service.go):
#   - sms_phone_window: minimum interval between two send-code requests for the same phone
#   - sms_per_phone_per_day: max sends to the same phone in 24h
#   - sms_per_ip_per_day: max sends from the same IP in 24h (IP is SHA-256 hashed before use)
ratelimit:
  sms_phone_window: 60s
  sms_per_phone_per_day: 5
  sms_per_ip_per_day: 10

# [Step 13] Consumer batch/flush tuning.
# Exposed here so RabbitMQ production tuning requires only a config change + restart.
consumer:
  like:
    batch_size: 50
    flush_interval: 3s
  pv:
    batch_size: 100
    flush_interval: 5s
  count:
    batch_size: 20
    flush_interval: 10s

# [Step 13] Cache TTLs.
# Exposed here so TTL adjustments (e.g. shorter PV dedup for high-traffic events)
# require only a config change + restart.
cache:
  like_state_ttl: 168h   # 7 days — see like_cache.go for rationale
  feed_cache_ttl: 5m     # per feed page; shorter = fresher but more DB load
  pv_dedup_ttl: 1h       # PRD-Phase2 §6 F-I02 AC-2