# configs/config.prod.yaml — Production environment template.
# Values in <> must be replaced with real secrets before deployment.
# Loaded when CONFIG_PATH=configs/config.prod.yaml (set in docker-compose.prod.yml).

server:
  port: 8080
  mode: release
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s

database:
  dsn: "<DB_USER>:<DB_PASSWORD>@tcp(mysql-master:3306)/cooking_platform?charset=utf8mb4&parseTime=True&loc=Local&timeout=5s"
  max_open_conns: 50
  max_idle_conns: 20
  max_lifetime: 5m
  max_idle_time: 5m
  log_level: warn

redis:
  addr: "redis-master:6379"   # sentinel mode configured separately via env
  password: "<REDIS_PASSWORD>"
  db: 0
  pool_size: 20
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

log:
  level: info
  console: false
  filename: /var/log/cooking/app.log
  max_size: 200
  max_backups: 14
  max_age: 30
  compress: true

jwt:
  secret: "<JWT_SECRET_MIN_32_CHARS>"
  access_token_ttl: 2h
  refresh_token_ttl: 168h

mq:
  provider: rabbitmq                              # dev=channel; prod 用 RabbitMQ 实现持久化 + 多实例共享消费
  url: "<env:APP_MQ_URL>"                         # amqp://cooking:pass@rabbitmq:5672/  注入，不 commit 真实值
  timeout: 10s                                    # dev=5s; prod 网络延迟较高，拨号超时放宽
  reconnect_max_retries: 5                        # 断线最多重试 5 次（指数退避 1s→2s→4s…上限 30s）
  reconnect_initial_delay: 1s

# [Step 10] Production uses real Aliyun SMS.
# access_key_id / access_key_secret injected via env:
#   APP_SMS_ACCESS_KEY_ID / APP_SMS_ACCESS_KEY_SECRET
sms:
  provider: aliyun
  access_key_id: "<SMS_ACCESS_KEY_ID>"
  access_key_secret: "<SMS_ACCESS_KEY_SECRET>"
  sign_name: "<SMS_SIGN_NAME>"
  template_code: "<SMS_TEMPLATE_CODE>"
  code_length: 6
  code_ttl: 5m

# [Step 10] Content moderation — production uses real Aliyun Green service.
# access_key_id / access_key_secret injected via env:
#   APP_AUDIT_ACCESS_KEY_ID / APP_AUDIT_ACCESS_KEY_SECRET
# Use a dedicated RAM sub-account with Green-read-only permissions
# (principle of least privilege — do NOT share with SMS or OSS key).
audit:
  provider: aliyun
  access_key_id: "<AUDIT_ACCESS_KEY_ID>"
  access_key_secret: "<AUDIT_ACCESS_KEY_SECRET>"
  region: cn-shanghai
  mock_result: ""     # ignored when provider=aliyun

# [Step 9] Production uses real Aliyun OSS.
# access_key_id and access_key_secret come from env:
#   APP_OSS_ACCESS_KEY_ID and APP_OSS_ACCESS_KEY_SECRET.
# Bucket and URL prefix must match — frontend builds image URLs by prefixing
# url_prefix to the object_key returned in the upload callback.
oss:
  provider: aliyun
  access_key_id: "<OSS_ACCESS_KEY_ID>"
  access_key_secret: "<OSS_ACCESS_KEY_SECRET>"
  endpoint: oss-cn-beijing.aliyuncs.com
  bucket: cooking-prod
  url_prefix: "https://cooking-prod.oss-cn-beijing.aliyuncs.com/"
  presign_ttl: 15m
  max_image_size: 5242880     # 5 MiB
  upload_hourly: 30
  mock_listen_addr: ""        # ignored when provider=aliyun

# [Step 11] Phone field-level encryption.
# production MUST inject real secrets via env vars — never commit actual keys.
# Generate: openssl rand -hex 32  →  phone_key (64 hex chars)
# Generate: openssl rand -base64 32  →  phone_pepper (arbitrary string)
encryption:
  phone_key: "<ENCRYPTION_PHONE_KEY>"       # env: APP_ENCRYPTION_PHONE_KEY
  phone_pepper: "<ENCRYPTION_PHONE_PEPPER>" # env: APP_ENCRYPTION_PHONE_PEPPER

# [Step 3] Rate-limit configuration.
# Production values match dev — these are UX knobs, not security knobs.
# Tune after observing real traffic patterns post-launch.
ratelimit:
  sms_phone_window: 60s
  sms_per_phone_per_day: 5
  sms_per_ip_per_day: 10