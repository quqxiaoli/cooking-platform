name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_test_pass
          MYSQL_DATABASE: cooking_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci_test_pass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      # Pin staticcheck to a known release tag so a breaking change upstream
      # cannot silently turn green PRs red overnight (Step 18 CI-01).  Bump
      # this version deliberately, in its own commit, when reviewing the
      # honnef.co/go/tools release notes.
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2025.1.1

      - name: staticcheck
        run: staticcheck ./...

      # Step 17 verifier: lints every CI/CD workflow + ensures the
      # integration-test entry points exist.  Catches "I forgot to update
      # pr.yml after renaming a step" before review (Step 18 CI-02).
      - name: verify-step17 (CI/CD self-check)
        run: make verify-step17

      - name: go test (unit + integration)
        env:
          TEST_MYSQL_DSN: root:ci_test_pass@tcp(127.0.0.1:3306)/cooking_ci
          TEST_REDIS_ADDR: 127.0.0.1:6379
        run: go test -v -race -count=1 ./...
