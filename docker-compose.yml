# docker-compose.yml — Development environment
# MySQL 8.0 master + slave (GTID) + Redis 7.2 + RabbitMQ 3.13
#
# Usage:
#   make docker-up   → start all services in background
#   make docker-down → stop and remove containers (volumes preserved)
#   make docker-down V=1 → also remove volumes (wipes data)
#
# MySQL replication topology (Step 14):
#   mysql (master, port 3306, server-id=1)
#   mysql-slave (slave, port 3307, server-id=2, read_only=ON)
#   mysql-slave-init (one-shot init container — sets up CHANGE REPLICATION SOURCE TO)


services:

  # ── MySQL 8.0 master ──────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: cooking-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: cooking123
      MYSQL_DATABASE: cooking_platform
      # Root user is sufficient for dev. Named user added in Step 11 (security hardening).
    ports:
      - "3306:3306"   # exposed to host so `go run ./cmd/server` can connect directly
    volumes:
      - mysql-dev-data:/var/lib/mysql
      # Custom MySQL config: ngram_token_size=2, utf8mb4, GTID (mirrors prod settings)
      - ./deploy/mysql/dev.cnf:/etc/mysql/conf.d/dev.cnf:ro
      # Create replication user on first init (GTID slave needs this user)
      - ./deploy/mysql/init-master.sql:/docker-entrypoint-initdb.d/01-init-master.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pcooking123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cooking-dev-net

  # ── MySQL 8.0 slave ───────────────────────────────────────────────────────
  # read_only=ON enforced via slave.cnf; host port 3307 avoids collision with master.
  mysql-slave:
    image: mysql:8.0
    container_name: cooking-mysql-slave-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: cooking123
      MYSQL_DATABASE: cooking_platform
      # Allow root@'%' so mysql-slave-init can connect from another container.
      # Safe in dev (isolated Docker network); prod uses a dedicated mgmt user.
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"   # host:3307 → container:3306 (app uses 127.0.0.1:3307 in dev)
    volumes:
      - mysql-slave-dev-data:/var/lib/mysql
      - ./deploy/mysql/slave.cnf:/etc/mysql/conf.d/slave.cnf:ro
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pcooking123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cooking-dev-net

  # ── MySQL replication initialiser (one-shot) ───────────────────────────────
  # Runs CHANGE REPLICATION SOURCE TO + START REPLICA after both master and
  # slave are healthy. restart=no ensures this is a one-shot init container.
  # On subsequent `docker compose up -d` calls, Docker skips this container
  # if it already exited successfully.
  mysql-slave-init:
    image: mysql:8.0
    container_name: cooking-mysql-slave-init
    restart: "no"
    environment:
      MASTER_HOST: mysql
      MASTER_PORT: "3306"
      SLAVE_HOST: mysql-slave
      REPL_USER: repl
      REPL_PASSWORD: repl123
      SLAVE_ROOT_PASSWORD: cooking123
    volumes:
      - ./deploy/mysql/init-slave.sh:/init-slave.sh:ro
    entrypoint: ["/bin/bash", "/init-slave.sh"]
    depends_on:
      mysql:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
    networks:
      - cooking-dev-net

  # ── Redis 7.2 ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: cooking-redis-dev
    restart: unless-stopped
    # No password in dev (matches configs/config.yaml redis.password = "").
    # Persistence disabled to keep dev startup fast; enable in prod.
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"   # exposed to host so `go run ./cmd/server` can connect directly
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - cooking-dev-net

  # ── Go application instances (Step 15) ───────────────────────────────────
  # app1 and app2 are identical; Docker network isolation means both can bind
  # to port 8080 inside their own containers without conflict.
  # Neither exposes a host port — all external traffic goes through Nginx.
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cooking-app1-dev
    restart: unless-stopped
    environment:
      CONFIG_PATH: configs/config.docker.yaml
    depends_on:
      mysql:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - cooking-dev-net

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cooking-app2-dev
    restart: unless-stopped
    environment:
      CONFIG_PATH: configs/config.docker.yaml
    depends_on:
      mysql:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - cooking-dev-net

  # ── Nginx reverse proxy (Step 15) ─────────────────────────────────────────
  # Exposes port 80 to the host; load-balances between app1 and app2.
  # Round-robin is the Nginx default; keepalive 32 reuses upstream connections.
  nginx:
    image: nginx:1.27-alpine
    container_name: cooking-nginx-dev
    restart: unless-stopped
    ports:
      - "80:80"   # only Nginx is exposed; app1/app2 are internal
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    networks:
      - cooking-dev-net

  # ── RabbitMQ 3.x (management plugin) ─────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cooking-rabbitmq-dev
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: cooking
      RABBITMQ_DEFAULT_PASS: cooking123
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"   # AMQP — exposed to host so `go run ./cmd/server` can connect
      - "15672:15672" # Management UI at http://localhost:15672 (cooking/cooking123)
    volumes:
      - rabbitmq-dev-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cooking-dev-net

volumes:
  mysql-dev-data:
    driver: local
    # Data persists across `docker compose down` (requires `docker compose down -v` to wipe).
  mysql-slave-dev-data:
    driver: local
  rabbitmq-dev-data:
    driver: local

networks:
  cooking-dev-net:
    driver: bridge
