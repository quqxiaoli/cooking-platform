worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/json;

    # Log format captures upstream address so verify_step15.sh can confirm
    # round-robin distribution across app1:8080 and app2:8080.
    log_format upstream '$remote_addr [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        'upstream=$upstream_addr '
                        'rt=$request_time ut=$upstream_response_time';

    access_log /var/log/nginx/access.log upstream;

    upstream cooking_backend {
        server app1:8080;
        server app2:8080;
        # Persistent connections to each upstream peer — avoids per-request TCP
        # handshake overhead; Go's net/http server supports HTTP/1.1 keep-alive natively.
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Passive health check: on connection error, timeout, or HTTP 503,
        # Nginx retries the next peer in the upstream pool.
        #
        # NOTE: Active health check (periodic probes to /health/ready) requires
        # nginx-plus or the third-party ngx_http_upstream_check_module.
        # The open-source nginx only supports passive health checking.
        # See Step 15 deviation log in docs/progress/15_项目进度追踪.md.
        proxy_next_upstream         error timeout http_503;
        proxy_next_upstream_tries   2;
        proxy_next_upstream_timeout 10s;

        location / {
            proxy_pass         http://cooking_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";      # clear for upstream keepalive
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
    }
}
