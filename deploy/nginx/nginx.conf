worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/json;

    # Log format captures upstream address so verify_step15.sh can confirm
    # round-robin distribution across app1:8080 and app2:8080.
    log_format upstream '$remote_addr [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        'upstream=$upstream_addr '
                        'rt=$request_time ut=$upstream_response_time';

    access_log /var/log/nginx/access.log upstream;

    # ── Body size cap (Step 18 NGINX-01) ──────────────────────────────────────
    # OSS image uploads are capped at 5 MiB in the app layer
    # (cfg.OSS.MaxImageSize, defence-in-depth checked in upload_service.go).
    # Nginx allows 6 MiB so a legitimate 5 MiB body + multipart boundary +
    # headers passes, while anything larger is rejected at the proxy with 413
    # before bytes hit the backend.  The Go app then re-validates.
    client_max_body_size 6m;
    client_body_buffer_size 256k;

    # ── Rate limit zones (Step 18 NGINX-01) ───────────────────────────────────
    # Two buckets, both keyed on $binary_remote_addr (per-IP):
    #
    #   api_zone — bulk API traffic.  30 r/s sustained + 50-burst no-delay
    #              gives a single client ~80 requests in the first second and
    #              then 30/s afterwards.  Real users never hit this; bots /
    #              accidental loops do.
    #
    #   sms_zone — SMS sending is expensive (real cost per send) and the
    #              service layer already enforces 1/min per phone, but Nginx
    #              adds an IP-level brake so a single attacker IP can't ramp
    #              the queue.  1 r/m sustained + 2-burst absorbs the
    #              occasional duplicated double-tap.
    #
    # Both zones reply 429 (limit_req_status), which the frontend can
    # special-case to "请稍后再试" without parsing the body.
    #
    # 10 MiB per zone holds ~160k distinct IPs — enough for MVP.
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=sms_zone:10m rate=1r/m;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;
    limit_req_status 429;
    limit_conn_status 429;

    upstream cooking_backend {
        server app1:8080;
        server app2:8080;
        # Persistent connections to each upstream peer — avoids per-request TCP
        # handshake overhead; Go's net/http server supports HTTP/1.1 keep-alive natively.
        keepalive 32;
    }

    # ── Shared proxy headers ──────────────────────────────────────────────────
    # Pulled into a snippet so every location block stays consistent.  Nginx
    # cannot `include` partial directives without a real file, so we repeat
    # the proxy_set_header lines per location — but they are identical, by
    # design, between /health, /api, and the default catch-all.
    #
    # Passive health check: on connection error, timeout, or HTTP 503, Nginx
    # retries the next peer in the upstream pool.  Active health check would
    # need nginx-plus or ngx_http_upstream_check_module; see Step 15 log.

    server {
        listen 80;
        server_name mellowck.com www.mellowck.com api.mellowck.com;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── server A: api.mellowck.com → 后端 ─────────────────────────────────
    # 后端 API 唯一公网入口。原 mellowck.com :443 的 location 集合整体迁过来。
    server {
        listen 443 ssl;
        http2 on;
        server_name api.mellowck.com;

        # ── SSL certificates (Let's Encrypt via certbot webroot) ──────────────
        ssl_certificate     /etc/letsencrypt/live/api.mellowck.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.mellowck.com/privkey.pem;

        # ── Mozilla Intermediate (ECDHE-only, no DHE → no dhparam needed) ────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:MozSSL:10m;
        ssl_session_tickets off;

        # ── HSTS ─────────────────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000" always;

        # ── Passive upstream health check ────────────────────────────────────
        proxy_next_upstream         error timeout http_503;
        proxy_next_upstream_tries   2;
        proxy_next_upstream_timeout 10s;

        # 红线 §10.3:API 子域更不能暴露 /metrics
        location = /metrics {
            return 404;
        }

        # /health — never rate-limited
        location ^~ /health {
            proxy_pass         http://cooking_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout    10s;
            proxy_send_timeout    10s;
        }

        # SMS send-code — strict per-IP brake (sms_zone)
        location = /api/v1/auth/send-code {
            limit_req zone=sms_zone burst=2 nodelay;
            limit_conn conn_zone 5;

            proxy_pass         http://cooking_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }

        # 默认接所有 API(api.* 子域专用,全部路径都是后端 API)
        location / {
            limit_req  zone=api_zone burst=50 nodelay;
            limit_conn conn_zone 20;

            proxy_pass         http://cooking_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
    }

    # ── server B: mellowck.com / www.mellowck.com → 前端 ──────────────────
    # 前端 Next.js 容器(cooking-frontend:3000)入口。
    # /api/v1/* 老外链兜底 301 到 api.;/api/* 是前端 BFF route handler。
    server {
        listen 443 ssl;
        http2 on;
        server_name mellowck.com www.mellowck.com;

        # ── SSL certificates ─────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/mellowck.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mellowck.com/privkey.pem;

        # ── Mozilla Intermediate ─────────────────────────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:MozSSL:10m;
        ssl_session_tickets off;

        # ── HSTS ─────────────────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000" always;

        # 兜底:野生 curl / 老外链 https://mellowck.com/api/v1/* → 301 到 api.
        # 两个 ^~ 同时存在时按最长前缀取,/api/v1/ 比 /api/ 优先;放在前面只是为了可读性。
        location ^~ /api/v1/ {
            return 301 https://api.mellowck.com$request_uri;
        }

        # 前端 BFF Route Handler(/api/auth/* / /api/users/me / /api/posts/* 等,不带 v1)
        location ^~ /api/ {
            proxy_pass         http://cooking-frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # 页面 / 静态资源 → Next.js
        location / {
            proxy_pass         http://cooking-frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
    }
}
